steps:

  - name: maven:3.8.3-openjdk-17
    entrypoint: mvn
    args: [ 'clean','install' ]

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: ls
    dir: "target"

  #building Image
  - name: 'gcr.io/cloud-builders/docker'
    args: [ 'build','-t', 'gcr.io/$PROJECT_ID/order-release-workflow:$COMMIT_SHA' ,"-f","Dockerfile", '.' ]

    # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [ 'push', 'gcr.io/$PROJECT_ID/order-release-workflow:$COMMIT_SHA' ]

  # Deploy container image to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [ 'run', 'deploy', 'order-release-workflow', '--image', 'gcr.io/$PROJECT_ID/order-release-workflow:$COMMIT_SHA', '--region', 'asia-south1', '--platform', 'managed']